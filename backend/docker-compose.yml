services:
  postgres:
    image: postgis/postgis:16-3.4
    platform: linux/amd64
    container_name: au-politics-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-au_politics}
      POSTGRES_USER: ${POSTGRES_USER:-au_politics}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-local-only}
    ports:
      - "${POSTGRES_PORT:-54329}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema:/schema:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-au_politics} -d ${POSTGRES_DB:-au_politics}"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
